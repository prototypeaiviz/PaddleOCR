Global:
  use_gpu: false
  epoch_num: 10
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: ./output/rec_aug_demo
  save_epoch_step: 2
  eval_batch_step: [0, 100]
  cal_metric_during_train: true
  pretrained_model:
  checkpoints:
  use_visualdl: false
  infer_img:
  character_dict_path:
  max_text_length: 25
  infer_mode: false
  use_space_char: false
  distributed: false

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.001
  regularizer:
    name: L2
    factor: 0.00001

Architecture:
  model_type: rec
  algorithm: CRNN
  Transform:
  Backbone:
    name: MobileNetV1Enhance
    scale: 0.5
  Neck:
    name: SequenceEncoder
    encoder_type: rnn
    hidden_size: 64
  Head:
    name: CTCHead
    fc_decay: 0.00001

Loss:
  name: CTCLoss

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc

Train:
  dataset:
    name: SimpleDataSet
    data_dir: ./generated_dataset/train
    label_file_list: [./generated_dataset/train/train.txt]
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - RecAug:
          tia_prob: 0.4
          crop_prob: 0.1
          reverse_prob: 0.0
          noise_prob: 0.2
          jitter_prob: 0.2
          blur_prob: 0.2
          hsv_aug_prob: 0.2
      - CTCLabelEncode:
      - RecResizeImg:
          image_shape: [3, 32, 160]
      - KeepKeys:
          keep_keys: [image, label, length]
  loader:
    shuffle: true
    batch_size_per_card: 32
    drop_last: false
    num_workers: 2

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: ./generated_dataset/val
    label_file_list: [./generated_dataset/val/val.txt]
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - CTCLabelEncode:
      - RecResizeImg:
          image_shape: [3, 32, 160]
      - KeepKeys:
          keep_keys: [image, label, length]
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 32
    num_workers: 2
